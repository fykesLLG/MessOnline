<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер v1</title>
    <!-- Подключение внешних проверенных dApp API -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="cordova.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #121212; }

        /* БЕЛОЕ МЕНЮ (Первый вход пользователя) */
        #auth-screen {
            display: none; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100%; background: #ffffff; color: #333; padding: 20px; z-index: 100; position: absolute;
        }
        .auth-box { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; }
        .auth-box input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; color: #000; }
        .agreement { display: flex; align-items: flex-start; gap: 10px; font-size: 14px; margin: 10px 0; color: #333; }
        .auth-box button { padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .auth-box button:disabled { background: #ccc; }

        /* СУПЕРАДМИНСКИЙ ЭКРАН ГЛОБАЛЬНОГО БАНА НА 7 ДНЕЙ */
        #ban-screen {
            display: none; flex-direction: column; justify-content: center; align-items: center;
            width: 100%; height: 100%; background: #000000; color: #d32f2f; padding: 20px; z-index: 200; position: absolute; text-align: center;
        }

        /* ТЁМНЫЙ ИНТЕРФЕЙС ГЛАВНОГО МЕНЮ */
        #main-screen { display: none; width: 100%; height: 100%; }
        .container { display: flex; width: 100%; height: 100%; }
        
        /* Левая панель (Занимает ровно 1/3 горизонтали по ТЗ) */
        .sidebar { width: 33.33%; border-right: 1px solid #2d2d2d; display: flex; flex-direction: column; background: #1a1a1a; }
        .sidebar-header { padding: 10px 15px; background: #151515; border-bottom: 1px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header button { padding: 6px 10px; background: #333; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        .search-box { padding: 15px; border-bottom: 1px solid #2d2d2d; display: flex; flex-direction: column; gap: 8px; }
        .search-box input { width: 100%; padding: 10px; background: #2d2d2d; border: none; border-radius: 6px; color: white; font-size: 14px; }
        .search-box button { padding: 8px; background: #444; border: none; color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; }
        
        /* Списки чатов и каналов со свободным скроллом вверх/вниз */
        .list-container { flex: 1; overflow-y: auto; }
        .list-item { padding: 12px 15px; cursor: pointer; display: flex; flex-direction: column; border-bottom: 1px solid #222; }
        .list-item:hover { background: #252525; }
        .list-item.active { background: #2d2d2d; }
        .list-item .item-title { font-weight: bold; font-size: 15px; color: #fff; }
        .list-item .item-meta { font-size: 11px; color: #888; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Правая панель (Занимает ровно 2/3 горизонтали по ТЗ) */
        .chat-area { width: 66.66%; display: flex; flex-direction: column; background: #141414; }
        .chat-header { padding: 15px; background: #1a1a1a; border-bottom: 1px solid #2d2d2d; display: flex; justify-content: space-between; align-items: center; min-height: 60px; }
        .chat-header-info { display: flex; flex-direction: column; }
        #active-chat-title { font-weight: bold; color: #fff; }
        #active-chat-status { font-size: 12px; color: #888; margin-top: 2px; }
        /* Окно истории сообщений со свободным скроллом вверх/вниз */
        .messages-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Параметры текста по ТЗ: идеальная читаемость на красном и зеленом */
        .msg { max-width: 70%; padding: 10px 14px; border-radius: 12px; font-size: 15px; position: relative; line-height: 1.4; word-break: break-word; color: #ffffff; text-shadow: 0px 1px 1px rgba(0,0,0,0.5); }
        .msg .sender-name { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; color: #ffeb3b; text-shadow: none; }
        
        /* Уникальный неоново-фиолетовый цвет имени для Администратора */
        .msg .sender-name.admin-name { color: #e040fb !important; font-weight: 900; text-transform: uppercase; }
        
        /* Цветовая гамма сообщений по ТЗ */
        .msg.alien { align-self: flex-start; background: #d32f2f; } /* Чужие сообщения — Красные */
        .msg.my { align-self: flex-end; background: #388e3c; }       /* Мои сообщения — Зелёные */
        
        /* Галочки доставки и прочтения (как в ТГ) */
        .ticks { font-size: 11px; margin-left: 8px; float: right; color: #e0e0e0; font-weight: bold; }
        .ticks.read { color: #81d4fa; } /* Голубые галочки */

        /* Строка ввода и отправки сообщений */
        .input-area { padding: 15px; background: #1a1a1a; display: flex; gap: 10px; border-top: 1px solid #2d2d2d; }
        .input-area input { flex: 1; padding: 12px; background: #2d2d2d; border: none; border-radius: 8px; color: white; font-size: 15px; }
        .input-area button { padding: 12px 20px; background: #388e3c; border: none; color: white; border-radius: 8px; font-size: 15px; cursor: pointer; }
        
        #btn-channel-settings { padding: 6px 12px; background: #d32f2f; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; display: none; }

        /* ОКНО НАСТРОЕК, СОЗДАНИЯ КАНАЛОВ И АДМИН-ПАНЕЛИ */
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 50; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; width: 100%; max-width: 400px; padding: 25px; display: flex; flex-direction: column; gap: 15px; color: #fff; max-height: 90vh; overflow-y: auto; }
        .modal-content h3 { border-bottom: 1px solid #333; padding-bottom: 10px; }
        .modal-content input, .modal-content button { width: 100%; padding: 10px; border-radius: 6px; font-size: 14px; }
        .modal-content input { background: #2d2d2d; border: none; color: #fff; }
        .modal-content button { background: #007bff; color: #fff; border: none; cursor: pointer; }
        .modal-content button.danger { background: #d32f2f; }
        .modal-content button.secondary { background: #444; }
        
        /* Секция админки, открывающаяся по секретному коду */
        .admin-section { display: none; border-top: 2px dashed #e040fb; padding-top: 15px; margin-top: 15px; }
        .admin-list-item { background: #252525; padding: 8px; margin-bottom: 6px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .admin-list-item button { width: auto; padding: 4px 8px; font-size: 11px; background: #d32f2f; border: none; border-radius: 4px; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: Белое меню регистрации (для самого первого входа) -->
    <div id="auth-screen">
        <div class="auth-box">
            <h2 style="margin-bottom:10px;">Регистрация Мессенджера v1</h2>
            <input type="text" id="reg-name" placeholder="Ваше имя">
            <input type="date" id="reg-date">
            <input type="text" id="reg-id" readonly placeholder="Генерация крипто-ID...">
            <label class="agreement">
                <input type="checkbox" id="reg-agree">
                <span>Я принимаю пользовательское соглашение для мессенджера</span>
            </label>
            <button id="btn-register" disabled>Зарегистрироваться</button>
        </div>
    </div>

    <!-- ЭКРАН БЛОКИРОВКИ: Появляется, если админ выдал бан на 7 дней -->
    <div id="ban-screen">
        <h1>ВЫ ЗАБАНЕНЫ АДМИНИСТРАТОРОМ</h1>
        <p style="margin: 20px 0; font-size: 18px; color: #aaa;">Доступ к приложению заблокирован на 7 дней за нарушение правил мессенджера.</p>
        <div id="ban-countdown" style="font-size: 24px; font-weight: bold;"></div>
    </div>

    <!-- ЭКРАН 2: Тёмный аккуратный мессенджер -->
    <div id="main-screen">
        <div class="container">
            <!-- Левая часть: список и поиск (1/3 горизонтали) -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <span style="font-weight:bold; font-size:14px;">Мои чаты</span>
                    <button id="btn-open-settings">⚙ Настройки</button>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Имя, ID или Канал...">
                    <button id="btn-search">Искать на сервере</button>
                </div>
                <div class="list-container" id="chats-list"></div>
            </div>

            <!-- Правая часть: чат и отправка (2/3 горизонтали) -->
            <div class="chat-area">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div id="active-chat-title">Выберите диалог</div>
                        <div id="active-chat-status"></div>
                    </div>
                    <button id="btn-channel-settings">Исключить участника</button>
                </div>
                
                <div class="messages-container" id="messages-box"></div>

                <div class="input-area">
                    <input type="text" id="msg-input" placeholder="Введите сообщение...">
                    <button id="btn-send">Отправить</button>
                </div>
            </div>
        </div>
    </div>
    <!-- МОДАЛЬНОЕ ОКНО НАСТРОЕК (Профиль + Создание канала + Админка) -->
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <h3>⚙ Настройки профиля</h3>
            <div>
                <label style="font-size:12px; color:#aaa;">Изменить имя:</label>
                <input type="text" id="settings-new-name" style="margin-top:5px;">
                <button id="btn-save-name" style="margin-top:8px; background:#28a745;">Сохранить имя</button>
            </div>
            
            <h3>📢 Создать канал</h3>
            <input type="text" id="new-channel-id" placeholder="ID канала (только английские буквы/цифры)">
            <input type="text" id="new-channel-name" placeholder="Название канала">
            <button id="btn-create-channel" style="background:#17a2b8;">Создать канал</button>
            
            <input type="password" id="admin-code-input" placeholder="Введите код администратора">
            <button id="btn-verify-admin" style="background:#6f42c1;">Стать Администратором</button>

            <!-- АДМИН ПАНЕЛЬ (Открывается по секретному коду) -->
            <div class="admin-section" id="admin-panel">
                <h3 style="color:#e040fb; margin-bottom:10px;">👑 Панель управления</h3>
                <h4 style="font-size:13px; color:#aaa; margin-bottom:5px;">Пользователи онлайн:</h4>
                <div id="admin-online-list" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
                <h4 style="font-size:13px; color:#aaa; margin-bottom:5px;">Шпионить за перепиской (ID комнаты):</h4>
                <input type="text" id="admin-spy-room-id" placeholder="Пример: id1_id2 или channel_id" style="margin-bottom:5px;">
                <button id="btn-admin-spy" style="background:#ffc107; color:#000; font-weight:bold;">Открыть чужой чат</button>
            </div>

            <hr style="border-color:#333;">
            <button id="btn-logout" class="danger">Выйти из аккаунта (Создать новый)</button>
            <button id="btn-close-modal" class="secondary">Закрыть</button>
        </div>
    </div>

    <script>
        // Инициализация Day.js для вывода времени (был в сети X минут назад)
        dayjs.extend(window.dayjs_plugin_relativeTime);
        dayjs.locale('ru');

        // Публичный глобальный dApp-реле узел GUN
        const SERVER_URL = 'https://herokuapp.com'; 
        const gun = Gun({ peers: [SERVER_URL], indexedDB: true });

        let myKeyPair = null;
        let currentUser = null;
        let activeChatId = null;
        let activeChatType = null; 
        let isUserScrollingUp = false;
        let isAdmin = false;

        const SECRET_ADMIN_CODE = "728282829200202";

        $(document).ready(function() {
            initApp();

            // Функция: Отслеживание умного скролла
            $('#messages-box').scroll(function() {
                const container = $(this);
                if (container.scrollTop() + container.innerHeight() < container.scrollHeight - 50) {
                    isUserScrollingUp = true;
                } else { isUserScrollingUp = false; }
            });
        });

        // Функция: Проверка LocalStorage и первичная крипто-авторизация
        async function initApp() {
            const cachedUser = localStorage.getItem('messenger_user');
            const cachedKeys = localStorage.getItem('messenger_keys');
            isAdmin = localStorage.getItem('is_admin') === 'true';
            
            if (cachedUser && cachedKeys) {
                currentUser = JSON.parse(cachedUser);
                myKeyPair = JSON.parse(cachedKeys);
                
                // Проверка глобального бана на 7 дней в графе GUN
                gun.get('banned_apps').get(currentUser.id).once(function(banTime) {
                    if (banTime && Date.now() < banTime) {
                        showBanScreen(banTime);
                    } else {
                        startMessenger();
                    }
                });
            } else {
                // Функция: Генерация криптографических ключей (Nostr-pubkey)
                const pair = await SEA.pair();
                myKeyPair = pair;
                const cleanId = pair.pub.replace(/[^a-z0-9]/gi, '').substr(0, 12).toLowerCase();
                $('#reg-id').val(cleanId);
                localStorage.setItem('messenger_keys', JSON.stringify(pair));
                $('#auth-screen').css('display', 'flex');
            }
        }

        // Функция: Экран блокировки при 7-дневном бане
        function showBanScreen(banTime) {
            $('#auth-screen').hide();
            $('#main-screen').hide();
            $('#ban-screen').css('display', 'flex');
            
            function updateCountdown() {
                const remain = banTime - Date.now();
                if (remain <= 0) { localStorage.removeItem('active_chat_id'); window.location.reload(); }
                const days = Math.floor(remain / (1000 * 60 * 60 * 24));
                const hours = Math.floor((remain % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((remain % (1000 * 60 * 60)) / (1000 * 60));
                $('#ban-countdown').text(`Осталось: ${days}д. ${hours}ч. ${mins}м.`);
            }
            updateCountdown();
            setInterval(updateCountdown, 30000);
        }
        // Функция: Запуск главного меню мессенджера
        function startMessenger() {
            $('#auth-screen').hide();
            $('#main-screen').show();
            $('#settings-new-name').val(currentUser.name);

            if(isAdmin) {
                $('#admin-panel').show();
                $('#btn-verify-admin').hide();
                $('#admin-code-input').hide();
            }

            // Функция: Обновление пульса сети (Heartbeat) каждые 10 секунд
            setInterval(() => {
                gun.get('users').get(currentUser.id).put({
                    id: currentUser.id,
                    name: currentUser.name,
                    lastSeen: Date.now(),
                    role: isAdmin ? 'admin' : 'user'
                });
            }, 10000);

            loadActiveChatsList();
            listenInbox();

            // Функция: Механика запоминания открытого чата
            const lastChat = localStorage.getItem('active_chat_id');
            const lastType = localStorage.getItem('active_chat_type');
            const lastName = localStorage.getItem('active_chat_name');
            if(lastChat && lastType) openChat(lastChat, lastName, lastType);
        }

        $('#reg-agree').change(function() {
            $('#btn-register').prop('disabled', !this.checked);
        });

        // Функция: Регистрация нового аккаунта
        $('#btn-register').click(function() {
            const name = $('#reg-name').val().trim();
            const bdate = $('#reg-date').val();
            const id = $('#reg-id').val();
            if(!name || !bdate) return alert('Заполните данные!');

            currentUser = { id: id, name: name, bdate: bdate, pub: myKeyPair.pub };
            localStorage.setItem('messenger_user', JSON.stringify(currentUser));
            gun.get('users').get(id).put({ id: id, name: name, pub: myKeyPair.pub, lastSeen: Date.now(), role: 'user' });
            startMessenger();
        });

        // Функция: Изменение имени в настройках
        $('#btn-save-name').click(function() {
            const newName = $('#settings-new-name').val().trim();
            if(!newName) return;
            currentUser.name = newName;
            localStorage.setItem('messenger_user', JSON.stringify(currentUser));
            gun.get('users').get(currentUser.id).get('name').put(newName);
            alert("Имя успешно изменено!");
        });

        // Функция: Создание канала владельцем
        $('#btn-create-channel').click(function() {
            const chId = $('#new-channel-id').val().trim().toLowerCase().replace(/[^a-z0-9]/gi, '');
            const chName = $('#new-channel-name').val().trim();
            if(!chId || !chName) return alert('Заполните поля канала!');

            gun.get('channels').get(chId).put({ id: chId, name: chName, owner: currentUser.id });
            saveChatToSidebar(chId, chName, 'channel');
            alert(`Канал "${chName}" успешно создан!`);
            $('#settings-modal').hide();
        });

        // Функция: Активация админ-панели по секретному коду
        $('#btn-verify-admin').click(function() {
            const code = $('#admin-code-input').val().trim();
            if(code === SECRET_ADMIN_CODE) {
                isAdmin = true;
                localStorage.setItem('is_admin', 'true');
                gun.get('users').get(currentUser.id).get('role').put('admin');
                $('#admin-panel').show();
                $('#btn-verify-admin').hide();
                $('#admin-code-input').hide();
                alert("Админка активна! У вас уникальный цвет имени.");
                loadAdminOnlineList();
            } else { alert("Неверный код доступа!"); }
        });

        // Функция: Выгрузка списка пользователей онлайн для админа
        function loadAdminOnlineList() {
            if(!isAdmin) return;
            $('#admin-online-list').empty();
            gun.get('users').map().on(function(user) {
                if(!user || !user.id || user.id === currentUser.id) return;
                const isOnline = (Date.now() - user.lastSeen) < 30000;
                if(isOnline) {
                    if($(`#adm-u-${user.
